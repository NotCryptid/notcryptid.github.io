<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Cryptids Emporium</title>
<link rel="icon" href="./main-assets/favicon.png" type="image/png" sizes="32x32" />
<style>
  :root {
    --side-margin: 20px;
    --gap: 8px;
    --press-duration: 260ms;
    --press-ease: cubic-bezier(.2,.7,.2,1.2);

    --frame-size: min(
      calc(100vw - (2 * var(--side-margin))),
      calc((100vh - (2 * var(--side-margin)) - (4 * var(--gap))) / 5)
    );

    --max-frame-width: 400px;
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overscroll-behavior: none;
    touch-action: none;
  }

  html {
    background-color: #000;
    background-image: url("./main-assets/Background.png");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
  }

  @media (max-width: 768px) and (orientation: portrait) {
    html { background-image: url("./main-assets/Background-480p.png"); }
  }

  @media (max-width: 1024px) and (orientation: landscape) {
    html { background-image: url("./main-assets/Background-720p.png"); }
  }

  @media (min-width: 769px) and (max-width: 1024px) and (orientation: portrait) {
    html { background-image: url("./main-assets/Background-1080p.png"); }
  }

  @media (min-width: 1025px) {
    html { background-image: url("./main-assets/Background-1440p.png"); }
  }

  @media (min-width: 1921px) {
    html { background-image: url("./main-assets/Background-4K.png"); }
  }

  body {
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: grid;
    place-items: center;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }

  .stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--gap);
    width: min(calc(100vw - (2 * var(--side-margin))), calc(var(--frame-size) * 2), var(--max-frame-width));
  }

  .pfp,
  .frame,
  .btn {
    width: min(calc(var(--frame-size) * 2), var(--max-frame-width));
    max-width: var(--max-frame-width);
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-size: 100% 100% !important;
    position: relative;
    overflow: hidden;
    background-color: transparent;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    -webkit-transform: translate3d(0, 0, 0);
    transform: translate3d(0, 0, 0);
    -webkit-mask-image: -webkit-radial-gradient(white, black);
    mask-image: radial-gradient(white, black);
  }

  .pfp {
    height: min(calc(var(--frame-size) * 2 / 2.29), calc(var(--max-frame-width) / 2.29));
    width: min(calc(var(--frame-size) * 2 / 2.29), calc(var(--max-frame-width) / 2.29));
    max-width: calc(var(--max-frame-width) / 2.29);
    max-height: calc(var(--max-frame-width) / 2.29);
    background-size: cover !important;
  }

  .about-me { aspect-ratio: 2.29 / 1; }
  .separator { aspect-ratio: 12.62 / 1; }
  .btn { aspect-ratio: 4.11 / 1; }

  .pfp { border-radius: 9999px; }
  .frame, .btn { border-radius: var(--radius); }

  .frame::after,
  .btn::after,
  .pfp::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.28),
      0 10px 30px rgba(0,0,0,.25);
    border-radius: inherit;
    pointer-events: none;
  }

  .liquid-glass {
    position: relative;
    z-index: 2;
  }

  .glass-content {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-position: center;
    background-repeat: no-repeat;
    background-size: 100% 100%;
    background-color: transparent;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    pointer-events: none;
    z-index: 3;
  }

  .liquid-glass.surface-tension {
    will-change: transform;
    transform-origin: center;
    transition: none;
  }

  .btn {
    cursor: pointer;
    display: grid;
    place-items: center;
    text-decoration: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }

  .btn:not(.surface-tension):hover {
    transform: scale(1.015);
    transition: transform 140ms ease;
  }

  .btn.pressed {
    animation: press-bounce var(--press-duration) var(--press-ease);
  }

  @keyframes press-bounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(.94); }
    60%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="stack">
   <div class="pfp" data-liquid-ignore style='background-image:url("./main-assets/pfp.png")'></div>

   <div class="frame about-me liquid-glass surface-tension"><div class="glass-content" data-liquid-ignore style='background-image:url("./main-assets/about-me.svg")'></div></div>
   <div class="frame separator liquid-glass surface-tension"><div class="glass-content" data-liquid-ignore style='background-image:url("./main-assets/separator.svg")'></div></div>

   <a class="btn liquid-glass surface-tension"
       href="https://github.com/NotCryptid/MicroOS"
     ><div class="glass-content" data-liquid-ignore style='background-image:url("./main-assets/microos.svg")'></div></a>

   <a class="btn liquid-glass surface-tension"
       href="https://github.com/Cryptidium"
     ><div class="glass-content" data-liquid-ignore style='background-image:url("./main-assets/cryptidium.svg")'></div></a>

   <a class="btn"
       href="https://claude.ai"
     data-liquid-ignore
     style='background-image:url("./main-assets/Claude%20Banner.svg")'></a>
  </div>

<script>
  const delay = ms => new Promise(r => setTimeout(r, ms));

  // Prevent pinch-zoom on macOS Safari and iOS where touch-action fails
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });

  (function() {
    // ── Detection ──────────────────────────────────────────────────────────
    var hasApple   = 'ApplePaySession' in window;
    var hasGesture = 'GestureEvent' in window;
    var hasAI      = !!window.ai;
    var isMobi     = /Mobi|Android/i.test(navigator.userAgent);

    var canvas = document.createElement('canvas');
    var gl     = canvas.getContext('webgl');
    var di     = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
    var rend   = di ? gl.getParameter(di.UNMASKED_RENDERER_WEBGL) : '';
    var hasANGLE = rend.includes('Direct3D') || rend.includes('D3D11') || rend.includes('D3D9') || rend.includes('vs_5_0');

    // ── Allow rules ────────────────────────────────────────────────────────
    // Windows Chrome or Edge (ANGLE confirms Windows, or AI flag enabled)
    if (!hasApple && !isMobi && (hasANGLE || hasAI)) return;
    // macOS Safari
    if (hasApple && hasGesture && !isMobi) return;
    // macOS Chrome
    if (hasApple && hasAI && !isMobi) return;
    // iOS Safari
    if (hasApple && isMobi) return;

    // ── Block: determine which gate ────────────────────────────────────────
    var gateId, gateHTML;
    var btnStyle = 'display:inline-block;padding:10px 22px;background:#fff;color:#000;border-radius:8px;text-decoration:none;font-size:.875rem;font-weight:600;margin:4px';
    var linkStyle = 'color:rgba(255,255,255,.55);font-size:.8rem;display:block;margin-top:6px;text-decoration:underline;cursor:pointer';

    if (hasApple && !hasAI && !hasGesture && !isMobi) {
      // macOS Firefox
      gateId = 'safari-gate';
      gateHTML = '<div style="max-width:460px;text-align:center;line-height:1.6">'
        + '<div style="font-size:2.4rem;margin-bottom:8px">⚠</div>'
        + '<h2 style="margin:0 0 12px;font-size:1.25rem;font-weight:700">Unsupported Browser</h2>'
        + '<p style="margin:0 0 6px;font-size:.9rem;color:rgba(255,255,255,.75)">This site requires Safari or Chrome on macOS.</p>'
        + '<p style="margin:0 0 20px;font-size:.85rem;color:rgba(255,255,255,.5)">Firefox is not supported.</p>'
        + '<button id="open-safari-btn" style="' + btnStyle + ';border:none;cursor:pointer">Open Safari</button>'
        + '</div>';
    } else if (!hasApple && isMobi) {
      // Android
      gateId = 'android-gate';
      gateHTML = '<div style="max-width:440px;text-align:center;line-height:1.6">'
        + '<div style="font-size:2.4rem;margin-bottom:8px">⚠</div>'
        + '<h2 style="margin:0 0 12px;font-size:1.25rem;font-weight:700">Unsupported Device</h2>'
        + '<p style="margin:0 0 6px;font-size:.9rem;color:rgba(255,255,255,.75)">This site is optimized for desktop and iOS devices.</p>'
        + '<p style="margin:0 0 20px;font-size:.85rem;color:rgba(255,255,255,.5)"><strong style="color:rgba(255,255,255,.8)">iPhone</strong> provides an excellent experience.</p>'
        + '<a href="https://apple.com/iphone" style="' + btnStyle + '">Explore iPhone</a>'
        + '</div>';
    } else if (!hasApple && !hasANGLE) {
      // Linux
      gateId = 'linux-gate';
      gateHTML = '<div style="max-width:440px;text-align:center;line-height:1.6">'
        + '<div style="font-size:2.4rem;margin-bottom:8px">⚠</div>'
        + '<h2 style="margin:0 0 12px;font-size:1.25rem;font-weight:700">Unsupported Operating System</h2>'
        + '<p style="margin:0 0 6px;font-size:.9rem;color:rgba(255,255,255,.75)">This site is optimized for Windows and macOS.</p>'
        + '<p style="margin:0 0 20px;font-size:.85rem;color:rgba(255,255,255,.5)"><strong style="color:rgba(255,255,255,.8)">Windows 11</strong> provides an excellent experience.</p>'
        + '<a href="https://www.microsoft.com/en-us/software-download/windows11" style="' + btnStyle + '">Download Windows 11</a>'
        + '</div>';
    } else {
      // Windows but not Chrome (no ANGLE would have been caught above, so this shouldn't hit — safety fallback)
      gateId = 'browser-gate';
      gateHTML = '<div style="max-width:460px;text-align:center;line-height:1.6">'
        + '<div style="font-size:2.4rem;margin-bottom:8px">⚠</div>'
        + '<h2 style="margin:0 0 12px;font-size:1.25rem;font-weight:700">Unsupported Browser</h2>'
        + '<p style="margin:0 0 6px;font-size:.9rem;color:rgba(255,255,255,.75)">This site requires Chrome on Windows.</p>'
        + '<p style="margin:0 0 20px;font-size:.85rem;color:rgba(255,255,255,.5)">Your current browser is not supported.</p>'
        + '<a href="https://www.google.com/chrome/" style="' + btnStyle + '">Download Chrome 148</a>'
        + '<div style="margin-top:20px;font-size:.85rem;color:rgba(255,255,255,.75)">Already using Chrome or Edge? Enable AI features:</div>'
        + '<a href="chrome://flags/#optimization-guide-on-device-model" style="' + linkStyle + '">chrome://flags/#optimization-guide-on-device-model</a>'
        + '<a href="edge://flags/#optimization-guide-on-device-model" style="' + linkStyle + '">edge://flags/#optimization-guide-on-device-model</a>'
        + '</div>';
    }

    // ── Wipe site content, skip liquidGL ──────────────────────────────────
    // Remove the main stack immediately so it never flashes
    var stack = document.querySelector('.stack');
    if (stack) stack.remove();

    // Prevent deferred liquidGL scripts from doing anything
    // by removing them before they execute (they're defer, so DOM is ready)
    document.querySelectorAll('script[src*="liquidGL"], script[src*="html2canvas"]').forEach(function(s) { s.remove(); });

    // ── Inject gate overlay ───────────────────────────────────────────────
    var overlay = document.createElement('div');
    overlay.id = gateId;
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:#fff;padding:24px;box-sizing:border-box';
    overlay.innerHTML = gateHTML;
    document.body.appendChild(overlay);

    // Safari button handler (can't use href="safari://" inline due to quoting)
    if (gateId === 'safari-gate') {
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('open-safari-btn');
        if (btn) btn.addEventListener('click', function() { window.location.href = 'safari://'; });
      });
      // Also fire immediately in case DOMContentLoaded already fired
      var btn = document.getElementById('open-safari-btn');
      if (btn) btn.addEventListener('click', function() { window.location.href = 'safari://'; });
    }
  })();

  // ── Main site init (only runs if not blocked) ─────────────────────────
  function loadSite() {
    var html2canvasScript = document.createElement('script');
    html2canvasScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    document.head.appendChild(html2canvasScript);

    var liquidScript = document.createElement('script');
    liquidScript.src = 'https://cdn.jsdelivr.net/gh/naughtyduk/liquidGL@main/scripts/liquidGL.js';
    liquidScript.onload = function() { bootstrapLiquidGL(); };
    document.head.appendChild(liquidScript);
  }

  function bootstrapLiquidGL() {
    if (typeof window.liquidGL !== 'function') return;

    window.liquidGL({
      snapshot: 'html',
      target: '.liquid-glass',
      resolution: 2,
      refraction: 0.02,
      bevelDepth: 0.08,
      bevelWidth: 0.14,
      frost: 0.8,
      shadow: true,
      specular: true,
      reveal: 'none',
      tilt: false,
      magnify: 1
    });

    document.querySelectorAll('.liquid-glass').forEach(function(el) {
      el.style.opacity = '1';
    });

    document.querySelectorAll('.btn.liquid-glass').forEach(function(el) {
      el.style.pointerEvents = 'auto';
    });

    var tensionElements = Array.from(document.querySelectorAll('.liquid-glass.surface-tension'));
    tensionElements.forEach(function(el) { el.style.pointerEvents = 'auto'; });

    tensionElements.forEach(function(el) {
      let snapping = false;
      let canSnap = false;
      let raf = null;
      let active = false;
      let latestPointer = null;
      let springRaf = null;
      let currentTx = 0, currentTy = 0, currentSx = 1, currentSy = 1;

      const setTransform = (tx, ty, sx, sy) => {
        currentTx = tx; currentTy = ty; currentSx = sx; currentSy = sy;
        el.style.transform = `translate3d(${tx}px, ${ty}px, 0) scaleX(${sx}) scaleY(${sy})`;
      };

      const stopSpring = () => {
        if (!springRaf) return;
        cancelAnimationFrame(springRaf);
        springRaf = null;
      };

      const playElasticReturn = (tx, ty, sx, sy, profile = 'snap') => {
        stopSpring();
        snapping = true;
        el.style.transition = '';

        const minKick = profile === 'snap' ? 5.4 : 4.2;
        if (Math.abs(tx) < minKick && Math.abs(ty) < minKick) {
          if (Math.abs(tx) >= Math.abs(ty)) tx = (tx === 0 ? 1 : Math.sign(tx)) * minKick;
          else ty = (ty === 0 ? 1 : Math.sign(ty)) * minKick;
        }

        const minScaleKick = profile === 'snap' ? 0.022 : 0.016;
        if (Math.abs(sx - 1) < minScaleKick) sx = sx >= 1 ? 1 + minScaleKick : 1 - minScaleKick;
        if (Math.abs(sy - 1) < minScaleKick) sy = sy >= 1 ? 1 + minScaleKick : 1 - minScaleKick;

        let x = tx, y = ty, xScale = sx, yScale = sy;
        let vx = -tx * (profile === 'snap' ? 16.2 : 11.4);
        let vy = -ty * (profile === 'snap' ? 16.2 : 11.4);
        let vsx = (1 - sx) * (profile === 'snap' ? 12.6 : 8.6);
        let vsy = (1 - sy) * (profile === 'snap' ? 12.6 : 8.6);

        const stiffness = profile === 'snap' ? 142 : 122;
        const damping = profile === 'snap' ? 5.2 : 6.4;
        const settlePos = 0.06, settleScale = 0.0012, settleVel = 0.03;
        const maxDurationMs = profile === 'snap' ? 1250 : 1050;
        const start = performance.now();
        let last = performance.now();

        const step = now => {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          vx += (-stiffness * x - damping * vx) * dt;
          vy += (-stiffness * y - damping * vy) * dt;
          vsx += (-stiffness * (xScale - 1) - damping * vsx) * dt;
          vsy += (-stiffness * (yScale - 1) - damping * vsy) * dt;
          x += vx * dt; y += vy * dt; xScale += vsx * dt; yScale += vsy * dt;
          setTransform(x, y, xScale, yScale);

          const settled = Math.abs(x) < settlePos && Math.abs(y) < settlePos
            && Math.abs(xScale - 1) < settleScale && Math.abs(yScale - 1) < settleScale
            && Math.abs(vx) < settleVel && Math.abs(vy) < settleVel
            && Math.abs(vsx) < settleVel && Math.abs(vsy) < settleVel;

          if (settled || (now - start) >= maxDurationMs) {
            springRaf = null; snapping = false; setTransform(0, 0, 1, 1); return;
          }
          springRaf = requestAnimationFrame(step);
        };
        springRaf = requestAnimationFrame(step);
      };

      const resetTransform = (smooth = true) => {
        if (raf) { cancelAnimationFrame(raf); raf = null; }
        if (snapping) { active = false; canSnap = true; return; }
        stopSpring();
        if (smooth) {
          const hasTension = Math.abs(currentTx) > 0.1 || Math.abs(currentTy) > 0.1
            || Math.abs(currentSx - 1) > 0.001 || Math.abs(currentSy - 1) > 0.001;
          if (hasTension) playElasticReturn(currentTx, currentTy, currentSx, currentSy, 'release');
          else { snapping = false; setTransform(0, 0, 1, 1); }
        } else {
          el.style.transition = ''; snapping = false; setTransform(0, 0, 1, 1);
        }
        active = false; canSnap = true;
      };

      const animate = () => {
        raf = null;
        const e = latestPointer;
        if (!e) return;
        const r = el.getBoundingClientRect();
        const edgeSlack = Math.max(22, Math.min(r.width, r.height) * 0.22);
        const nearElement = e.clientX >= r.left - edgeSlack && e.clientX <= r.right + edgeSlack
          && e.clientY >= r.top - edgeSlack && e.clientY <= r.bottom + edgeSlack;
        const outsideX = e.clientX < r.left ? r.left - e.clientX : e.clientX > r.right ? e.clientX - r.right : 0;
        const outsideY = e.clientY < r.top ? r.top - e.clientY : e.clientY > r.bottom ? e.clientY - r.bottom : 0;
        const outsideDistance = Math.hypot(outsideX, outsideY);
        const insideOriginalBounds = outsideDistance === 0;
        if (!active && !nearElement) return;
        if (active && !nearElement) { if (!snapping) resetTransform(true); return; }
        active = true;
        if (snapping) { if (!nearElement) return; stopSpring(); snapping = false; }

        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        const dx = e.clientX - cx, dy = e.clientY - cy;
        const diagonal = Math.hypot(r.width, r.height);
        const t = Math.min(1, Math.hypot(dx, dy) / Math.max(30, diagonal * 0.15));
        const eased = t * (2 - t);
        const outsideBlend = insideOriginalBounds
          ? 1
          : Math.pow(Math.max(0, 1 - outsideDistance / Math.max(1, edgeSlack)), 2) * 0.48;
        const tension = eased * outsideBlend;
        const tx = dx * 0.06 * tension, ty = dy * 0.06 * tension;
        const axisTotal = Math.abs(dx) + Math.abs(dy) + 1;
        const stretch = 0.06 * tension;
        const sx = 1 + (Math.abs(dx) / axisTotal) * stretch;
        const sy = 1 + (Math.abs(dy) / axisTotal) * stretch;
        setTransform(tx, ty, sx, sy);
        if (insideOriginalBounds) canSnap = true;

        const breakSlack = Math.max(26, Math.min(r.width, r.height) * 0.2);
        if (!insideOriginalBounds && canSnap && outsideDistance > breakSlack) {
          canSnap = false;
          const minOff = 2.8, minSD = 0.014;
          const snapTx = Math.abs(tx) < minOff ? (dx === 0 ? 0 : Math.sign(dx) * minOff) : tx;
          const snapTy = Math.abs(ty) < minOff ? (dy === 0 ? 0 : Math.sign(dy) * minOff) : ty;
          const snapSx = Math.abs(sx - 1) < minSD ? (sx >= 1 ? 1 + minSD : 1 - minSD) : sx;
          const snapSy = Math.abs(sy - 1) < minSD ? (sy >= 1 ? 1 + minSD : 1 - minSD) : sy;
          playElasticReturn(snapTx, snapTy, snapSx, snapSy, 'snap');
        }
      };

      window.addEventListener('pointermove', e => { latestPointer = e; if (raf) return; raf = requestAnimationFrame(animate); }, { passive: true });
      window.addEventListener('pointerleave', () => resetTransform(true), { passive: true });
      window.addEventListener('blur', () => resetTransform(false));
    });
  }

  document.querySelectorAll('.btn').forEach(el => {
    el.addEventListener('click', async e => {
      e.preventDefault();
      if (el.classList.contains('pressed')) return;
      el.classList.add('pressed');
      await delay(220);
      window.location.href = el.href;
      await delay(80);
      el.classList.remove('pressed');
    }, { passive: false });

    el.addEventListener('pointerdown', () => el.classList.add('pressed'), { passive: true });
    el.addEventListener('pointerup',   () => el.classList.remove('pressed'), { passive: true });
    el.addEventListener('pointerleave',() => el.classList.remove('pressed'), { passive: true });
  });

  // Only load liquidGL if the gate didn't block us (stack still exists)
  if (document.querySelector('.stack')) {
    window.addEventListener('load', loadSite);
  }
</script>
</body>
</html>
