<style>
  :root {
    --side-margin: 20px;
    --gap: 8px;
    --press-duration: 260ms;
    --press-ease: cubic-bezier(.2,.7,.2,1.2);

    --frame-size: min(
      calc(100vw - (2 * var(--side-margin))),
      calc((100vh - (2 * var(--side-margin)) - (4 * var(--gap))) / 5)
    );

    --max-frame-width: 400px;
    --radius: 18px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  html {
    background: url("./main-assets/Background.png") center / cover no-repeat fixed;
  }

  @media (max-width: 768px) and (orientation: portrait) {
    html {
      background-image: url("./main-assets/Background-480p.png");
    }
  }

  @media (max-width: 1024px) and (orientation: landscape) {
    html {
      background-image: url("./main-assets/Background-720p.png");
    }
  }

  @media (min-width: 769px) and (max-width: 1024px) and (orientation: portrait) {
    html {
      background-image: url("./main-assets/Background-1080p.png");
    }
  }

  @media (min-width: 1025px) {
    html {
      background-image: url("./main-assets/Background-1440p.png");
    }
  }

  @media (min-width: 1921px) {
    html {
      background-image: url("./main-assets/Background-4k.png");
    }
  }

  body {
    background: transparent;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: grid;
    place-items: center;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }

  .stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--gap);
    width: min(calc(100vw - (2 * var(--side-margin))), calc(var(--frame-size) * 2), var(--max-frame-width));
  }

  .pfp,
  .frame,
  .btn {
    width: min(calc(var(--frame-size) * 2), var(--max-frame-width));
    max-width: var(--max-frame-width);
    background-position: center !important;
    background-repeat: no-repeat !important;
    background-size: 100% 100% !important;
    position: relative;
    overflow: hidden;
    transform: translateZ(0);
  }

  .pfp {
    height: min(calc(var(--frame-size) * 2 / 2.29), calc(var(--max-frame-width) / 2.29));
    width: min(calc(var(--frame-size) * 2 / 2.29), calc(var(--max-frame-width) / 2.29));
    max-width: calc(var(--max-frame-width) / 2.29);
    max-height: calc(var(--max-frame-width) / 2.29);
    background-size: cover !important;

  .about-me {
    aspect-ratio: 2.29 / 1;
  }

  .separator {
    aspect-ratio: 12.62 / 1;
  }

  .btn {
    aspect-ratio: 4.11 / 1;

    text-decoration: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }

<script>
  const delay = ms => new Promise(r => setTimeout(r, ms));

  document.addEventListener('DOMContentLoaded', () => {
    const bootstrapLiquidGL = () => {
      if (typeof window.liquidGL !== 'function') return false;

      window.liquidGL({
        snapshot: 'html',
        target: '.liquid-glass',
        resolution: 2,
        refraction: 0.02,
        bevelDepth: 0.08,
        bevelWidth: 0.14,
        frost: 0.8,
        shadow: true,
        specular: true,
        reveal: 'none',
        tilt: false,
        magnify: 1
      });

      // Ensure targets render immediately with no opacity/transition fade.
      document.querySelectorAll('.liquid-glass').forEach(el => {
        el.style.opacity = '1';
      });

      // Keep anchors interactive after lens setup.
      document.querySelectorAll('.btn.liquid-glass').forEach(el => {
        el.style.pointerEvents = 'auto';
      });

      // liquidGL disables pointer events on targets; restore them for tension tracking.
      const tensionElements = Array.from(document.querySelectorAll('.liquid-glass.surface-tension'));

      tensionElements.forEach(el => {
        el.style.pointerEvents = 'auto';
      });

      // Surface-tension interaction: stretch while close, snap back if pulled too far.
      tensionElements.forEach(el => {
        let snapping = false;
        let canSnap = false;
        let raf = null;
        let active = false;
        let latestPointer = null;
        let springRaf = null;
        let currentTx = 0;
        let currentTy = 0;
        let currentSx = 1;
        let currentSy = 1;

        const setTransform = (tx, ty, sx, sy) => {
          currentTx = tx;
          currentTy = ty;
          currentSx = sx;
          currentSy = sy;
          el.style.transform = `translate3d(${tx}px, ${ty}px, 0) scaleX(${sx}) scaleY(${sy})`;
        };

        const stopSpring = () => {
          if (!springRaf) return;
          cancelAnimationFrame(springRaf);
          springRaf = null;
        };

        const playElasticReturn = (tx, ty, sx, sy, profile = 'snap') => {
          stopSpring();

          snapping = true;
          el.style.transition = '';

          // Ensure there is enough displacement to show a visible recoil.
          const minKick = profile === 'snap' ? 5.4 : 4.2;
          if (Math.abs(tx) < minKick && Math.abs(ty) < minKick) {
            if (Math.abs(tx) >= Math.abs(ty)) {
              tx = (tx === 0 ? 1 : Math.sign(tx)) * minKick;
            } else {
              ty = (ty === 0 ? 1 : Math.sign(ty)) * minKick;
            }
          }

          const minScaleKick = profile === 'snap' ? 0.022 : 0.016;
          if (Math.abs(sx - 1) < minScaleKick) {
            sx = sx >= 1 ? 1 + minScaleKick : 1 - minScaleKick;
          }
          if (Math.abs(sy - 1) < minScaleKick) {
            sy = sy >= 1 ? 1 + minScaleKick : 1 - minScaleKick;
          }

          let x = tx;
          let y = ty;
          let xScale = sx;
          let yScale = sy;

          // Push initial velocity opposite the pull so energy visibly transfers across center.
          let vx = -tx * (profile === 'snap' ? 16.2 : 11.4);
          let vy = -ty * (profile === 'snap' ? 16.2 : 11.4);
          let vsx = (1 - sx) * (profile === 'snap' ? 12.6 : 8.6);
          let vsy = (1 - sy) * (profile === 'snap' ? 12.6 : 8.6);

          const stiffness = profile === 'snap' ? 142 : 122;
          const damping = profile === 'snap' ? 5.2 : 6.4;
          const settlePos = 0.06;
          const settleScale = 0.0012;
          const settleVel = 0.03;
          const maxDurationMs = profile === 'snap' ? 1250 : 1050;
          const start = performance.now();
          let last = performance.now();

          const step = now => {
            const dt = Math.min(0.033, (now - last) / 1000);
            last = now;

            const ax = -stiffness * x - damping * vx;
            const ay = -stiffness * y - damping * vy;
            const asx = -stiffness * (xScale - 1) - damping * vsx;
            const asy = -stiffness * (yScale - 1) - damping * vsy;

            vx += ax * dt;
            vy += ay * dt;
            vsx += asx * dt;
            vsy += asy * dt;

            x += vx * dt;
            y += vy * dt;
            xScale += vsx * dt;
            yScale += vsy * dt;

            setTransform(x, y, xScale, yScale);

            const settled =
              Math.abs(x) < settlePos &&
              Math.abs(y) < settlePos &&
              Math.abs(xScale - 1) < settleScale &&
              Math.abs(yScale - 1) < settleScale &&
              Math.abs(vx) < settleVel &&
              Math.abs(vy) < settleVel &&
              Math.abs(vsx) < settleVel &&
              Math.abs(vsy) < settleVel;

            const expired = (now - start) >= maxDurationMs;

            if (settled || expired) {
              springRaf = null;
              snapping = false;
              setTransform(0, 0, 1, 1);
              return;
            }

            springRaf = requestAnimationFrame(step);
          };

          springRaf = requestAnimationFrame(step);
        };

        const resetTransform = (smooth = true) => {
          if (raf) {
            cancelAnimationFrame(raf);
            raf = null;
          }

          // Never interrupt an active elastic return with a hard reset.
          if (snapping) {
            active = false;
            canSnap = true;
            return;
          }

          stopSpring();

          if (smooth && !snapping) {
            const hasTension =
              Math.abs(currentTx) > 0.1 ||
              Math.abs(currentTy) > 0.1 ||
              Math.abs(currentSx - 1) > 0.001 ||
              Math.abs(currentSy - 1) > 0.001;

            if (hasTension) {
              playElasticReturn(currentTx, currentTy, currentSx, currentSy, 'release');
            } else {
              snapping = false;
              setTransform(0, 0, 1, 1);
            }
          } else {
            el.style.transition = '';
            snapping = false;
            setTransform(0, 0, 1, 1);
          }

          active = false;
          canSnap = true;
        };

        const animate = () => {
          raf = null;
          const e = latestPointer;
          if (!e) return;

          const r = el.getBoundingClientRect();
          const edgeSlack = Math.max(22, Math.min(r.width, r.height) * 0.22);
          const inX = e.clientX >= r.left - edgeSlack && e.clientX <= r.right + edgeSlack;
          const inY = e.clientY >= r.top - edgeSlack && e.clientY <= r.bottom + edgeSlack;
          const nearElement = inX && inY;

          const outsideX = e.clientX < r.left
            ? r.left - e.clientX
            : e.clientX > r.right
              ? e.clientX - r.right
              : 0;
          const outsideY = e.clientY < r.top
            ? r.top - e.clientY
            : e.clientY > r.bottom
              ? e.clientY - r.bottom
              : 0;
          const outsideDistance = Math.hypot(outsideX, outsideY);
          const insideOriginalBounds = outsideDistance === 0;

          if (!active && !nearElement) {
            return;
          }

          if (active && !nearElement) {
            if (!snapping) {
              resetTransform(true);
            }
            return;
          }

          active = true;
          if (snapping) return;

          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;
          const distance = Math.hypot(dx, dy);
          const diagonal = Math.hypot(r.width, r.height);

          const stretchLimit = Math.max(30, diagonal * 0.15);
          const t = Math.min(1, distance / stretchLimit);
          const eased = t * (2 - t);

          // Outside the original bounds, blend in tension gradually to avoid cursor-lock jumps.
          const outsideBlend = insideOriginalBounds
            ? 1
            : Math.pow(Math.max(0, 1 - (outsideDistance / Math.max(1, edgeSlack))), 2) * 0.48;
          const tension = eased * outsideBlend;

          const tx = dx * 0.06 * tension;
          const ty = dy * 0.06 * tension;
          const axisTotal = Math.abs(dx) + Math.abs(dy) + 1;
          const stretchAmount = 0.06 * tension;
          const sx = 1 + (Math.abs(dx) / axisTotal) * stretchAmount;
          const sy = 1 + (Math.abs(dy) / axisTotal) * stretchAmount;

          setTransform(tx, ty, sx, sy);

          if (insideOriginalBounds) {
            canSnap = true;
          }

          const breakSlack = Math.max(26, Math.min(r.width, r.height) * 0.2);
          if (!insideOriginalBounds && canSnap && outsideDistance > breakSlack) {
            canSnap = false;

            // Ensure enough stored energy to produce visible opposite-side recoil.
            const minSnapOffset = 2.8;
            const snapTx = Math.abs(tx) < minSnapOffset
              ? (dx === 0 ? 0 : Math.sign(dx) * minSnapOffset)
              : tx;
            const snapTy = Math.abs(ty) < minSnapOffset
              ? (dy === 0 ? 0 : Math.sign(dy) * minSnapOffset)
              : ty;

            const scaleDeltaX = Math.abs(sx - 1);
            const scaleDeltaY = Math.abs(sy - 1);
            const minScaleDelta = 0.014;
            const snapSx = scaleDeltaX < minScaleDelta
              ? (sx >= 1 ? 1 + minScaleDelta : 1 - minScaleDelta)
              : sx;
            const snapSy = scaleDeltaY < minScaleDelta
              ? (sy >= 1 ? 1 + minScaleDelta : 1 - minScaleDelta)
              : sy;

            playElasticReturn(snapTx, snapTy, snapSx, snapSy, 'snap');
          }
        };

        window.addEventListener('pointermove', e => {
          latestPointer = e;
          if (raf) return;
          raf = requestAnimationFrame(animate);
        }, { passive: true });

        window.addEventListener('pointerleave', () => resetTransform(true), { passive: true });
        window.addEventListener('blur', () => resetTransform(false));
      });

      return true;
    };

    if (!bootstrapLiquidGL()) {
      window.addEventListener('load', bootstrapLiquidGL, { once: true });
    }
  });

  document.querySelectorAll('.btn').forEach(el => {
    el.addEventListener('click', async e => {
      e.preventDefault();
      if (el.classList.contains('pressed')) return;
      el.classList.add('pressed');
      await delay(220);
      window.location.href = el.href;
      await delay(80);
      el.classList.remove('pressed');
    }, { passive: false });

    el.addEventListener('pointerdown', () => el.classList.add('pressed'), { passive: true });
    el.addEventListener('pointerup',   () => el.classList.remove('pressed'), { passive: true });
    el.addEventListener('pointerleave',() => el.classList.remove('pressed'), { passive: true });
  });
</script>
